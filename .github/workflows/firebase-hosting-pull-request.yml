# This file was auto-generated by the Firebase CLI and corrected for Flutter
name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Flutter on the virtual machine
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 2. Get dependencies and build the project
      - run: flutter pub get
      - run: flutter build web

      # 3. Deploy the built files to a Firebase preview channel
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AWRA_SPINWHEEL }}
          projectId: awra-spinwheel

